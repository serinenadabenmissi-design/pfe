<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accès Refusé - NutriLife</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .error-frame {
            background: white;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            max-width: 450px;
            width: 100%;
            padding: 40px 32px;
            text-align: center;
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .error-icon {
            width: 80px;
            height: 80px;
            background: #fee2e2;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }
        
        .error-icon span {
            font-size: 40px;
        }
        
        .error-code {
            font-size: 14px;
            font-weight: 600;
            color: #dc2626;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 12px;
        }
        
        .error-title {
            font-size: 24px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 12px;
        }
        
        .error-message {
            font-size: 15px;
            color: #64748b;
            line-height: 1.6;
            margin-bottom: 24px;
        }
        
        .error-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 14px;
            text-decoration: none;
            transition: all 0.2s ease;
            cursor: pointer;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #27AE60, #2ecc71);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(39, 174, 96, 0.4);
        }
        
        .btn-outline {
            background: transparent;
            border: 2px solid #e2e8f0;
            color: #475569;
        }
        
        .btn-outline:hover {
            background: #f8fafc;
            border-color: #27AE60;
            color: #27AE60;
        }
        
        .login-hint {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
            font-size: 13px;
            color: #94a3b8;
        }
        
        .login-hint a {
            color: #27AE60;
            text-decoration: none;
            font-weight: 500;
        }
        
        .login-hint a:hover {
            text-decoration: underline;
        }
        
        @media (max-width: 480px) {
            .error-frame {
                padding: 32px 24px;
            }
            
            .error-title {
                font-size: 20px;
            }
            
            .btn {
                padding: 10px 20px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="error-frame">
        <div class="error-icon">
            <span>🔒</span>
        </div>
        <div class="error-code">Erreur {{ error_code|default:403 }}</div>
        <h1 class="error-title">{{ error_title|default:"Accès Refusé" }}</h1>
        <p class="error-message">{{ error_message|default:"Vous n'avez pas les autorisations nécessaires pour accéder à cette page." }}</p>
        
        <div class="error-actions">
            <a href="javascript:history.back()" class="btn btn-outline">
                ← Retour
            </a>
            <a href="{{ redirect_url|default:'/' }}" class="btn btn-primary">
                Se connecter →
            </a>
        </div>
        
        <div class="login-hint">
            Besoin d'aide ? <a href="/contact/">Contacter le support</a>
        </div>
    </div>
</body>
</html>
